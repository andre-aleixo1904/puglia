<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#FFFFFF"/>
  <!-- Italian flag, 3:2 ratio: 300x200 -->
  <g transform="translate(106, 128)">
    <rect x="0"   y="0" width="100" height="200" fill="#009246"/>
    <rect x="100" y="0" width="100" height="200" fill="#FFFFFF"/>
    <rect x="200" y="0" width="100" height="200" fill="#CE2B37"/>
    <rect x="0"   y="0" width="300" height="200" fill="none" stroke="#D8D8D8" stroke-width="1"/>
  </g>
  <text x="256" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" text-anchor="middle" fill="#273240">Puglia</text>
</svg>
